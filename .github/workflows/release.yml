name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: bash tests/run-tests.sh

      - name: Build marketplace bundle
        run: bash scripts/build-marketplace.sh

      - name: Create release archive
        run: |
          cd dist
          tar czf omo-marketplace-${{ steps.version.outputs.version }}.tar.gz omo-marketplace/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "omo ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            dist/omo-marketplace-${{ steps.version.outputs.version }}.tar.gz
